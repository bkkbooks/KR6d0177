front:
  text: 科金剛錍序宋雲間沙門淨嶽撰科分大經章段起自關內憑小山瑤前代未聞也吾祖章安作疏益詳至荊溪將迦葉品分正緣了別指方隅則權實進否曉然而明可謂善乎派深良哉析重也余復以佛性周遍三千具攝而分今文分而又分賓主問答引文釋義略無混亂雖短脛亦可以厲法流孺子敢當荷負矣或曰猶牧女之添水將非澆漓於乳味乎不然乳益乳也苟能鑽搖醍醐可獲豈仍乳而已耶科文分二初總題二初正標題次述人號次別文三初序分二初通敘佛性旨歸四初積學潛心自二意成解行恐三喻法顯要萬四思修則契若次別敘今文緣起二初假夢曾二寄客仍二正宗二初正示佛性體周遍二初略領客問二初問謂二領余次廣釋客難五初釋涅槃瓦石佛性四初釋非性文難客二主約大小教判二初縱余二判然三客迷部難教客四主復宗大小教釋二初明涅槃進否權實二初斥他不解余次明今立宗三初示立意今二正立宗今立三引經釋義二初釋迦葉品二初佛性進否二初正釋二初引示正因性三初約因明正性三初引文經二釋義請三結在因既二約果明正性次三兼前雙結豈次引示緣了性二初迦葉難二初示難意由二引經文故二如來答三初標二引二初先順問答六初權順問三初引經先二反難客今三示經意故二正因結難二初引經故次出經意佛三迦葉竝空初標示引經迦次明經竝意迦四敘佛捨喻從法佛五復釋結難示正因遍六復釋捨喻示緣了局次復宗明空四初示意次二引經二初破邪計十初破心所三初引經初二釋義語三斥世同邪世二破光明二初引經復二斥世同邪世三破住處二初引經有二斥世同邪世四破次第二初引經有二斥世同邪世五破三處二初引經有二斥世同邪世六破可作二初引經有二斥世同邪世七破無礙處二初引經有二斥世同邪世八破與有竝合二初引經有二斥世同邪世九破器中二初引經有二斥世同邪世十破指處二初引經有二斥世同邪世次總斥無常佛三釋邪正故四結復宗三結斥三初斥同邪計世二斥同迦葉云三斥謬斆習世次結斥此二教之權實二泛示諸文次依現未直立圓融二釋智論無情法性三釋三因種遍四釋屢聞別見五酬四教判情性二仍約三千顯具攝三流通次教之權實二初正示權實三初帶權況二說實若頓三釋帶權意欲次泛示諸文二初佛性進否三初通標故涅二別列四初報應佛性三初引經如二試質野客子三預防轉計二初難主有果性二初以果德難因性若次以因性難果德又次難但有法性若二四句辨性二初引文又復次難不了子云三五味難性二初引經又次難不了何四道品見性二初引經又次難不了為三總斥故子次教之權實二初客難客次主答三初通示涅槃權實意二初為未熟用權蘇息四初機劣未堪余二緣了不遍涅三三因俱局若四結用權意所次防末代權實竝明三初却示一代顯頓又二示大經帶權涅三斥客權實俱迷若二別示涅槃權實文二初客問客曰次主答二初通答余曰二別答五初權實并明如二一向權若三一向實若四泛例權實他五終舉實文斥他如云三結斥此世人下次依現未直立圓融十初明二經顯實二初法華顯實如二次涅槃顯實故涅二令依二經破立今搜三斥他不曉教義他不四斥他反自疑心信五示生佛一體故六曉諭無差之旨以七結斥不知權實進否故八重示立論所以余九重約大小判斥十結斥勸信二一約法故子二約喻二初事理相對五初立喻是二合法雖三約法斥他若四直示法體故五以事理結此次事理各論三初喻二初唯理若唯二唯迷若唯二約有情略合情三以無情例合無二釋智論無情法性二初客難於是次主答四初斥世謬傳余二泛通其義汛三客反徵客曰四廣徵各五初客斥余曰二約佛即法徵理三佛法相須徵不四以即否定大小是五廣以異名難客五初總真定如法性故二難真如若三難法性二初牒計若次引經難四初證有報佛性何二證有應佛性又三證有法佛性又四誡勸免迷請四正示名體同異二初名異體同二初體同二初二初正釋故次引證故佛次法性與真如同三初引文示義華二例餘名所三結斥故二義異二初廣明義異二初泛約三類明異然次別示從因所以所次的示涅槃佛性二初遍名之意二初正明經義涅次斥世不了世次性遍所由三初由煩惱心又二由生死色子三結由心色一如何次名同體異三初結前生後故二引示名同故三勉釋舊疑子五總示世失三初牒計故二斥失則三觀生新解子三釋三因種遍二初客難切次主客五初原他不决之由余二定今開導之法余三主問攻通二初攻解八初約佛性問二約無常問三約唯心問四約衆生問五約佛土問六約果成問七約真如問八約譬喻問次攻行問行四示立問之意二初略示如次委示二初客問客次主答四初示問意該攝余二約對鈍根為三及對六即及四復示互融應五客述信解三初五番往復領大教之旨五第一番二初客述客曰次主徵余曰第二番二初客述客次主徵余第三番二初客述客次主徵余第四番二初客述客次主徵余第五番二初客述四初領二無差別客二領諸教大旨世三領果德之意了四領佛現之由應次主印證余二二番往復審修證之法二第一番二初客問客次主答余第二番二初客問客次主答余三客重仰慕誓為仗託客曰善哉四釋屢聞別見二初客疑次主釋二初推原諸師過由二初約法斥四初不知大小余二亡佛圓宗亡三傳習之謬謬四不曉出沒專次約喻斥如次令反問諸師忽五終酬四教判情性四初客問客二主却余三客并問客四主許示二初許余次示三初以偏圓判情性二初判偏教但云無情何次明圓人心外無境圓二以造等釋偏圓義三初迭論通局言二以遍釋具以三總結通局所三以偏圓結造等相二初歷教揀造故二對揀反具論二仍約三千顯具攝五初依方便品三初三千體量二初客問客二主答余二三千所出二初客問客二主答余三三千名相二初客問客二主答余二明通亘二部是故三結唯在法花由前四示為諸法本當知五勉勸修進子得三流通分四初客請於是二主答二初汛示佛經方軌二初知根余次不知根然次正喻今文流通四初勉護順子應二正示方軌五初為未稟者二初為開解六初示種性若二示體量既三示體德既四破但清淨性若五破但正因性若六總結種等今次令修行既二為巳稟者若巳三為散心者散四為觀心者一五為憚教者若三證令謙喻故四勸信流通余今維時延寶龍飛己未以明藏科本謄寫焉沙門慧湛
